<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Exchange Equity Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h2>Fast Investment Assessment Engine</h2>
</header>

<section class="container">

    <!-- INPUTS -->
    <div class="col">

        <input id="net_income" type="number" step="0.01" placeholder="Net income">
        <input id="net_cash_flow" type="number" step="0.01" placeholder="Net cash flow">
        <input id="roe" type="number" step="0.01" placeholder="Return on equity (ROE)">
        <input id="roa" type="number" step="0.01" placeholder="Return on assets (ROA)">
        <input id="ebitda" type="number" step="0.01" placeholder="EBITDA">

        <input id="sector" type="text" list="sector-options" placeholder="Sector">

        <datalist id="sector-options">
            <option value="agriculture and food industry"></option>
            <option value="chemicals and health products"></option>
            <option value="commercial services"></option>
            <option value="communication technologies and media"></option>
            <option value="consumer goods and e-commerce"></option>
            <option value="energy technology"></option>
            <option value="financial and insurance"></option>
            <option value="health and life sciences"></option>
            <option value="hospitality industry"></option>
            <option value="manufacturing industry"></option>
            <option value="real estate and construction"></option>
            <option value="technology and engineering"></option>
            <option value="transport and motorization"></option>
        </datalist>

        <input id="cumulation" type="number" list="cumulation-options"
               placeholder="Cumulation (0 or 1)">

        <datalist id="cumulation-options">
            <option value="0"></option>
            <option value="1"></option>
        </datalist>

        <button onclick="run_analysis()" id="btn-generate-report" disabled>
            Run analysis
        </button>

    </div>

    <!-- RESULTS -->
    <div class="col">

        <div class="progress-row">
            <span class="label">High</span>
            <div class="progress-bar">
                <div class="progress-fill" id="fill-high">0%</div>
            </div>
        </div>

        <div class="progress-row">
            <span class="label">Middle</span>
            <div class="progress-bar">
                <div class="progress-fill" id="fill-middle">0%</div>
            </div>
        </div>

        <div class="progress-row">
            <span class="label">Low</span>
            <div class="progress-bar">
                <div class="progress-fill" id="fill-low">0%</div>
            </div>
        </div>

        <!-- OUTPUT LLM -->
        <div class="report-box">
            <button> Generate the report </button>
            <div id="llm-output"></div>
        </div>

    </div>

</section>

<footer class="footer-class"></footer>

<script type="module" src="./app.js"></script>

</body>
</html>
