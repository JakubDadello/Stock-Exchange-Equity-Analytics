AWSTemplateFormatVersion: 2010-09-09

Parameters:
  ImageUri:
    Type: String

Resources:
# ============================================================
# IAM ROLE & PERMISSIONS
# ============================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      # Allows Lambda service to assume this role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      # Standard policy for CloudWatch Logs access
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                # Best Practice: Narrow down resource access if possible
                Resource: arn:aws:s3:::pqa-bucket/*

# ============================================================
# COMPUTE (LAMBDA FUNCTION)
# ============================================================
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      PackageType: Image
      Role: !GetAtt LambdaRole.Arn
      # Dynamic ImageUri using Sub to handle different account/region deployments
      Code:
        ImageUri: !Ref ImageUri 
      Timeout: 30
      MemorySize: 2048
      Architectures:
        - x86_64

# ============================================================
# MONITORING & OBSERVABILITY
# ============================================================
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # Matches the default Lambda naming convention to ensure logs are captured
      LogGroupName: !Sub "/aws/lambda/${LambdaFunction}"
      RetentionInDays: 14 # Professional standard to manage storage costs

  LambdaErrorMetric:
    Type: AWS::Logs::MetricFilter
    Properties: 
      FilterPattern: '"ERROR"'
      LogGroupName: !Ref LambdaLogGroup
      MetricTransformations:
      -   MetricName: Lambda_func_errors
          MetricNamespace: PQA_metrics
          MetricValue: "1"

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: "PQA-alerts"
      Tags:
        - Key: project
          Value: pqa 

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: kejdi16try@gmail.com
      TopicArn: !Ref AlertTopic 

  LambdaErrAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Triggers notification if Lambda reports multiple errors"
      AlarmActions: 
      -   !Ref AlertTopic
      AlarmName: LambdaErrAlarm
      MetricName: Lambda_func_errors
      Namespace: PQA_metrics
      Statistic: Sum
      Period: 30 
      EvaluationPeriods: 1
      Threshold: 3 
      ComparisonOperator: GreaterThanOrEqualToThreshold 

# ============================================================
# API GATEWAY (INTERFACE)
# ============================================================
  GatewayAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties: 
      Name: pqa-gateway-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*" 
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - "content-type"
        MaxAge: 300
  
  GatewayAPIIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties: 
      ApiId: !Ref GatewayAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: "2.0"
      
  GatewayAPIRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: 
      ApiId: !Ref GatewayAPI
      RouteKey: "POST /predict-v1"
      Target: !Sub "integrations/${GatewayAPIIntegration}"

  GatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref GatewayAPI
      AutoDeploy: true
      StageName: development 
  
  # Crucial: Allows API Gateway to trigger the Lambda function
  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties: 
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunction
      Principal: apigateway.amazonaws.com
      # Restricted SourceArn for better security posture
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${GatewayAPI}/*/*"

# ============================================================
# OUTPUTS (For Team Collaboration)
# ============================================================
Outputs:
  ServiceEndpoint:
    Description: "Public URL for the Prediction API"
    Value: !Sub "https://${GatewayAPI}.execute-api.${AWS::Region}.amazonaws.com/development/predict-v1"